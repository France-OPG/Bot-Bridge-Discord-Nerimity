version: '3.8'

services:
  bridge:
    build: .
    container_name: nerimity-discord-bridge
    restart: unless-stopped

    # Variables d'environnement — copie .env.example en .env et remplis les valeurs
    env_file:
      - .env

    volumes:
      # Persistance du fichier de mapping des channels entre redémarrages
      - ./data:/app/data

    # Ressources (ajuste selon ton Proxmox)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Healthcheck : vérifie que le process Node.js tourne
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').existsSync('/app/dist/index.js') || process.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
